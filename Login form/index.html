<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 antialiased flex items-center justify-center min-h-screen p-4 font-sans">
  <main class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 sm:p-8 transition-all duration-200">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">Welcome back</h1>
    <p class="text-gray-500 text-sm mb-6">Please enter your details to log in.</p>

    <form id="loginForm" novalidate>
      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required 
          autocomplete="email" 
          placeholder="your@email.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white text-gray-800"
        >
      </div>

      <div class="mb-5">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            autocomplete="current-password" 
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition pr-20 bg-white text-gray-800"
          >
          <button 
            type="button" 
            id="togglePassword" 
            class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-3 py-1.5 rounded-md transition focus:outline-none focus:ring-2 focus:ring-blue-500"
            aria-label="Show password"
          >
            Show
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
      </div>

      <div class="flex flex-wrap items-center justify-between gap-2 mb-6">
        <div class="flex items-center">
          <input 
            type="checkbox" 
            id="remember" 
            name="remember" 
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded bg-white"
          >
          <label for="remember" class="ml-2 block text-sm text-gray-700 select-none">Remember me</label>
        </div>
        <a 
          href="#" 
          class="text-sm text-blue-600 hover:text-blue-800 hover:underline transition"
          aria-label="You already forgot password? – reset your password"
        >
          You already forgot password?
        </a>
      </div>

      <button 
        type="submit" 
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Log in
      </button>

      <p class="text-xs text-center text-gray-400 mt-4">Demo — no data is sent</p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
